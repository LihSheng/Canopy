name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode-go/deepseek-v4-flash
          use_github_token: true
      
      - name: Debug opencode failure
        if: failure()
        shell: bash
        env:
          MODEL_INPUT: opencode-go/deepseek-v4-flash
        run: |
          echo "=== Model config ==="
          echo "MODEL env (set by action): $MODEL"
          echo "MODEL_INPUT (from workflow): $MODEL_INPUT"
          echo "OPENCODE_API_KEY set: $([ -n \"$OPENCODE_API_KEY\" ] && echo 'YES' || echo 'NO')"
          echo ""
          echo "=== Find all opencode artifact paths ==="
          for dir in ~/.local/share/opencode ~/.opencode ~/.config/opencode /home/runner/.opencode; do
            if [ -d "$dir" ]; then
              echo "--- $dir ---"
              find "$dir" -type f -maxdepth 5 -print 2>/dev/null || true
            fi
          done
          echo ""
          echo "=== Log files ==="
          for dir in ~/.local/share/opencode/log ~/.opencode/log ~/.config/opencode/log; do
            if [ -d "$dir" ]; then
              echo "--- $dir ---"
              for f in "$dir"/*.log; do
                [ -f "$f" ] || continue
                echo ">>> $f (last 200 lines) <<<"
                tail -n 200 "$f" 2>/dev/null || true
                echo ""
              done
            fi
          done
          echo ""
          echo "=== SQLite state (last 50 lines via strings) ==="
          for db in ~/.local/share/opencode/*.db ~/.opencode/*.db /home/runner/.opencode/*.db; do
            if [ -f "$db" ]; then
              echo "--- $db ---"
              strings "$db" | tail -n 50 || true
            fi
          done
          echo ""
          echo "=== opencode.json in workspace ==="
          cat opencode.json 2>/dev/null || echo "(not found)"
          echo ""
          echo "=== Job env (names only, not values) ==="
          env | cut -d= -f1 | sort || true
      