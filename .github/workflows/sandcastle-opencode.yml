name: Sandcastle OpenCode Agent

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task for the OpenCode agent"
        required: true
        type: string
      issue_number:
        description: "GitHub Issue number to work on (optional). Use 4, #4, or https://github.com/<owner>/<repo>/issues/4."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sandcastle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create working branch
        run: git checkout -b sandcastle/opencode-${{ github.run_id }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@latest

      - name: Run Sandcastle agent
        run: npx tsx scripts/sandcastle-opencode.ts
        env:
          SANDCASTLE_TASK: ${{ inputs.task }}
          SANDCASTLE_ISSUE_NUMBER: ${{ inputs.issue_number }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_BASE_URL: ${{ secrets.OPENCODE_BASE_URL }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Push changes
        run: git push --force-with-lease origin sandcastle/opencode-${{ github.run_id }}

      - name: Ensure automated label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create automated \
            --color "1d76db" \
            --description "Automated Sandcastle/OpenCode PRs" \
            || true

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "## Sandcastle OpenCode Agent Run" > /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "**Task:** ${{ inputs.task }}" >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "**Summary of changes:**" >> /tmp/pr-body.md
          echo "Automated changes generated by the Sandcastle + OpenCode agent." >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "**Checks performed:**" >> /tmp/pr-body.md
          echo "See agent output in workflow logs." >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "**Branch:** sandcastle/opencode-${{ github.run_id }}" >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "**Note:** Please review all changes before merging." >> /tmp/pr-body.md

          gh pr create \
            --base main \
            --head "sandcastle/opencode-${{ github.run_id }}" \
            --title "Sandcastle OpenCode: ${{ inputs.task }}" \
            --body-file /tmp/pr-body.md \
            --label "automated"

      - name: Clean up failed branch
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X DELETE repos/${{ github.repository }}/git/refs/heads/sandcastle/opencode-${{ github.run_id }} || true
