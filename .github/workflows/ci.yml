name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ──────────────────────────────────────────────

  frontend-lint-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  frontend-unit:
    runs-on: ubuntu-latest
    needs: frontend-lint-typecheck
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  frontend-integration:
    runs-on: ubuntu-latest
    needs: frontend-lint-typecheck
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run test:integration

  # ── Backend ───────────────────────────────────────────────

  backend-lint-format-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check
      - run: mypy .

  backend-unit:
    runs-on: ubuntu-latest
    needs: backend-lint-format-typecheck
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -m unit

  backend-integration:
    runs-on: ubuntu-latest
    needs: backend-lint-format-typecheck
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -m integration

  # ── Coverage ──────────────────────────────────────────────

  backend-coverage:
    runs-on: ubuntu-latest
    needs: [backend-unit, backend-integration]
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: |
          pytest \
            --cov=analytics \
            --cov=anomalies \
            --cov=sync \
            --cov=ontology \
            --cov=insights \
            --cov=exports \
            --cov=refresh \
            --cov=common \
            --cov-report=term \
            --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/backend/coverage.xml

  # ── Regression Gates ──────────────────────────────────────

  backend-api-schema-gate:
    runs-on: ubuntu-latest
    needs: backend-lint-format-typecheck
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -m "api_schema" -x --tb=long

  backend-business-rule-gate:
    runs-on: ubuntu-latest
    needs: backend-lint-format-typecheck
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -m "business_rule" -x --tb=long

  # ── Smoke ─────────────────────────────────────────────────

  smoke:
    runs-on: ubuntu-latest
    needs:
      - backend-unit
      - backend-integration
      - frontend-unit
      - frontend-integration
      - backend-api-schema-gate
      - backend-business-rule-gate
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration/test_smoke.py -v --tb=long
