name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Frontend ──────────────────────────────────────────────

  frontend-lint-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci --legacy-peer-deps --legacy-peer-deps
      - run: npm run lint
      - run: npm run typecheck

  frontend-unit:
    runs-on: ubuntu-latest
    needs: frontend-lint-typecheck
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run test:unit

  frontend-integration:
    runs-on: ubuntu-latest
    needs: frontend-lint-typecheck
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run test:integration

  # ── Backend ───────────────────────────────────────────────

  backend-lint-format-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check . --fix
      - run: ruff format --check
      - run: mypy .

  backend-unit:
    runs-on: ubuntu-latest
    needs: backend-lint-format-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    env:
      HERD_AGGREGATOR_TEST_SERVER_URL: postgresql+psycopg://postgres:postgres@localhost:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -m unit

  backend-integration:
    runs-on: ubuntu-latest
    needs: backend-lint-format-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    env:
      HERD_AGGREGATOR_TEST_SERVER_URL: postgresql+psycopg://postgres:postgres@localhost:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -m integration

  # ── Coverage ──────────────────────────────────────────────

  backend-coverage:
    runs-on: ubuntu-latest
    needs: [backend-unit, backend-integration]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    env:
      HERD_AGGREGATOR_TEST_SERVER_URL: postgresql+psycopg://postgres:postgres@localhost:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: |
          pytest \
            --cov=analytics \
            --cov=anomalies \
            --cov=sync \
            --cov=ontology \
            --cov=insights \
            --cov=exports \
            --cov=refresh \
            --cov=common \
            --cov-report=term \
            --cov-report=xml
      - uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: apps/backend/coverage.xml

  # ── Regression Gates ──────────────────────────────────────

  frontend-route-state-gate:
    runs-on: ubuntu-latest
    needs: frontend-lint-typecheck
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run src/tests/unit/navigation-route-state.test.ts src/tests/unit/navigation-links.test.ts src/tests/unit/navigation-time-range.test.ts

  frontend-analytics-shell-gate:
    runs-on: ubuntu-latest
    needs: frontend-lint-typecheck
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run src/tests/unit/analytics-shell.test.tsx

  backend-api-schema-gate:
    runs-on: ubuntu-latest
    needs: backend-lint-format-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    env:
      HERD_AGGREGATOR_TEST_SERVER_URL: postgresql+psycopg://postgres:postgres@localhost:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -m "api_schema" -x --tb=long

  backend-business-rule-gate:
    runs-on: ubuntu-latest
    needs: backend-lint-format-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    env:
      HERD_AGGREGATOR_TEST_SERVER_URL: postgresql+psycopg://postgres:postgres@localhost:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -m "business_rule" -x --tb=long

  # ── Smoke ─────────────────────────────────────────────────

  smoke:
    runs-on: ubuntu-latest
    needs:
      - backend-unit
      - backend-integration
      - frontend-unit
      - frontend-integration
      - frontend-route-state-gate
      - frontend-analytics-shell-gate
      - backend-api-schema-gate
      - backend-business-rule-gate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    env:
      HERD_AGGREGATOR_TEST_SERVER_URL: postgresql+psycopg://postgres:postgres@localhost:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration/test_smoke.py -v --tb=long
