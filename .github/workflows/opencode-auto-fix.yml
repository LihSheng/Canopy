name: OpenCode Auto Fix CI

# ── Why comment-triggered, not automatic ─────────────────────
# This workflow only runs when a developer explicitly
# comments /fix-ci, /oc fix-ci, or /opencode fix-ci on a PR.
#
# We deliberately do NOT auto-trigger on every CI failure
# because:
#  1. AI-generated fixes must be reviewed by a human.
#  2. Flaky infrastructure failures should not produce
#     code changes.
#  3. Some test failures need domain knowledge the agent
#     does not have (e.g. business-rule changes).
#
# Explicit opt-in keeps the agent a helpful assistant
# rather than an autonomous committer.
#
# SCOPE: lint/format/typecheck only. Test failures are
# excluded — they require human judgement.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:

# Security: required for OpenCode to push fix branches and
# read workflow logs.  We use contents: write scoped to the
# action — the agent prompt below constrains what can be
# pushed (never main/master/release).
permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  opencode-auto-fix:
    name: OpenCode Auto Fix Failed CI
    runs-on: ubuntu-latest

    # ── Safety timeout ──────────────────────────────────────
    # Prevents the job from running indefinitely if the agent
    # gets stuck.  Adjust if your typical fix cycle needs more time.
    timeout-minutes: 30

    # ── Trigger guard ───────────────────────────────────────
    # Only proceed when:
    #   a) workflow_dispatch (manual trigger), OR
    #   b) the comment body starts with one of the magic phrases
    #
    # For issue_comment events we also guard against fork PRs
    # (see first step below).
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.comment.body, '/fix-ci') ||
      startsWith(github.event.comment.body, '/oc fix-ci') ||
      startsWith(github.event.comment.body, '/opencode fix-ci')

    steps:
      # ── Fork-PR safety gate ──────────────────────────────
      # Secrets are not forwarded to fork PRs, but we also
      # refuse to run at all to avoid confusing failures.
      - name: Block fork PRs
        if: github.event.pull_request.head.repo.fork == true
        shell: bash
        run: |
          echo "::error::OpenCode auto-fix is not supported on fork PRs."
          echo "Secrets are not available, and we cannot safely push changes."
          exit 1

      # ── Branch safety gate ───────────────────────────────
      # Never push directly to protected branches.
      - name: Determine base branch
        id: branch-check
        shell: bash
        run: |
          BASE="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          echo "base_branch=$BASE" >> "$GITHUB_OUTPUT"

      - name: Block push to protected branches
        if: |
          steps.branch-check.outputs.base_branch == 'main' ||
          steps.branch-check.outputs.base_branch == 'master' ||
          startsWith(steps.branch-check.outputs.base_branch, 'release/')
        shell: bash
        run: |
          echo "::error::OpenCode auto-fix target branch is" \
               "'${{ steps.branch-check.outputs.base_branch }}' — refusing to run."
          echo "OpenCode will NOT push directly to main, master, or release branches."
          echo ""
          echo "Open a PR from a feature branch, then comment /fix-ci on that PR."
          exit 1

      - name: ── Print context ──
        shell: bash
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  OpenCode Auto Fix — CI Repair Agent"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "  PR:         ${{ github.event.pull_request.html_url || 'manual trigger' }}"
          echo "  PR #:       ${{ github.event.pull_request.number || 'N/A' }}"
          echo "  Branch:     ${{ github.head_ref || github.ref_name }}"
          echo "  Base:       ${{ github.base_ref || 'N/A' }}"
          echo "  Actor:      ${{ github.actor }}"
          echo "  Trigger:    ${{ github.event_name }}"
          echo ""
          echo "  ⏱  timeout: 30 minutes"
          echo ""
          echo "  What will happen:"
          echo "    1. OpenCode agent inspects the failed CI run logs"
          echo "    2. Identifies failing lint/format/typecheck step"
          echo "    3. Makes the smallest safe fix"
          echo "    4. Re-runs the relevant lint command"
          echo "    5. Commits the fix to the PR branch"
          echo ""
          echo "  ❌ Test failures are excluded — only lint issues are fixed."
          echo ""
          echo "  Check CI run:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "  ─────────────────────────────────────────────────────────"
          echo "  This step runs the OpenCode action. Output will appear"
          echo "  below as the agent works. If nothing changes for 5+ min"
          echo "  the agent may be thinking — check the logs above."
          echo "═══════════════════════════════════════════════════════════════"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use the PR merge ref when triggered by a comment, so the
          # agent sees the actual pending changes.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run OpenCode auto-fix
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          # These enable verbose/debug output from the action
          ACTIONS_STEP_DEBUG: true
          ACTIONS_RUNNER_DEBUG: true
        with:
          model: opencode-go/deepseek-v4-flash
          use_github_token: true
          prompt: |
            You are fixing a failed GitHub Actions CI run.

            Repository structure:
            - Frontend: apps/frontend
            - Backend: apps/backend

            SCOPE RESTRICTION: lint/format/typecheck ONLY.
            Test failures are excluded. If no lint check failed,
            report "no lint failure found" and exit without making changes.

            Relevant CI checks (lint-only):
            - npm run lint
            - npm run typecheck
            - ruff check .
            - ruff format --check
            - mypy .

            Task:
            1. Inspect the failed GitHub Actions run and logs.
            2. Identify the failing lint/format/typecheck check.
            3. If no lint check failed, report "no lint failure found" and stop.
            4. Determine the root cause before editing.
            5. Make the smallest safe code change.
            6. Do not modify secrets, .env files, deployment files, CI credentials, or unrelated config.
            7. Re-run the relevant lint command after editing.
            8. If the first fix fails, try at most one more focused fix.
            9. Stop if the problem is flaky infrastructure or unclear.
            10. Summarize:
               - failing job/check
               - root cause
               - files changed
               - lint command re-run
               - final result

            ## Security rules (never violate these)
            - Do not push directly to main, master, or release/* branches.
            - Do not modify .env files, secrets, deployment credentials, or production configuration.
            - Keep changes minimal and focused. No broad refactors.
            - Do not update lockfiles unless a dependency change is truly required for the fix.

      # ── Always-run log dump ──────────────────────────────
      # Even on timeout or failure, dump any OpenCode log
      # artifacts that exist on disk so you can see what the
      # agent was doing.
      - name: Dump agent logs
        if: always()
        shell: bash
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  OpenCode Agent Log Dump (always runs even on failure)"
          echo "═══════════════════════════════════════════════════════════════"
          found=0
          for dir in ~/.local/share/opencode ~/.opencode ~/.config/opencode /home/runner/.opencode; do
            if [ -d "$dir" ]; then
              found=1
              echo ""
              echo "─── $dir ───"
              find "$dir" -type f -maxdepth 5 -print 2>/dev/null | head -50
            fi
          done
          if [ "$found" = "0" ]; then
            echo "(No OpenCode agent directories found — agent may not have started writing logs)"
          fi
          echo ""
          echo "─── Any .log files created in last 2 hours ───"
          find ~ -name "*.log" -maxdepth 4 -mmin -120 2>/dev/null | head -20 || true
          echo ""
          echo "─── Agent summary ───"
          echo "Job result: ${{ job.status }}"
          echo "See the 'Run OpenCode auto-fix' step above for live agent output."
